<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - Sentra Keramik Purwakarta</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="cart.css" />
  </head>
  <body>
    <header class="detail-header">  <!-- Bisa pakai class yang sama dengan detail produk -->
      <nav class="detail-nav">
        <div class="logo">
          <img src="gambar/images-removebg-preview.png" alt="Logo" />
          <h2>Sentra Keramik Purwakarta</h2>
          <h2>|</h2>
          <h3>Cart</h3>
        </div>
        <ul>
          <li><a href="cart.html">🛒</a></li>
          <li><a>👤</a></li>
        </ul>
      </nav>
    </header>

    <main class="cart-page">
      <section class="delivery-option">
        <button class="delivery-btn">Delivery</button>
        <button class="pickup-btn active">Pick Up</button>
      </section>

      <section class="address-box">
        <h4>Tambahkan Alamat</h4>
        <button>Add</button>
      </section>

      <!-- ganti "all-product" jadi "select-all" sesuai CSS -->
      <p class="select-all">☑ Semua</p>

      <!-- Container item cart, diisi oleh JavaScript -->
      <section class="cart-list" id="cartContainer">
        <!-- Dinamis -->
      </section>

      <section class="checkout-box">
        <p>
          Total (<span id="checkedCount">0</span> item):
          <strong id="totalHargaCart">Rp0</strong>
        </p>
        <button id="checkoutBtn">Check Out</button>
      </section>
    </main>

    <script src="Java Script/cart.js"></script>
  </body>
</html>
