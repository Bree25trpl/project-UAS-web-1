<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="cart.css" />
  </head>
  <body>
    <header class="header-cart">
      <nav class="cart-nav">
        <div class="logo">
          <img src="gambar/images-removebg-preview.png" />
          <h2>Sentra Keramik Purwakarta</h2>
          <h2>|</h2>
          <h3>Cart</h3>
        </div>

        <ul>
          <li><a>🛒</a></li>
          <li><a>👤</a></li>
        </ul>
      </nav>
    </header>

    <main class="cart-page">
      <section class="delivery-option">
        <button class="delivery-btn">Delivery</button>

        <button class="pickup-btn active">Pick Up</button>
      </section>

      <section class="address-box">
        <h4>Tambahkan Alamat</h4>

        <button>Add</button>
      </section>

      <p class="all-product">☑ Semua</p>

      <section class="cart-list">
        <article class="cart-card">
          <div class="store-header">
            <h3>Keramik Mulya Plered</h3>

            <span>Dikirim dalam 3 hari</span>
          </div>

          <div class="cart-content">
            <span class="check-icon">☑</span>

            <img src="gambar/aca74648293e2d81636180a760c38c08.jpg" />

            <div class="product-info">
              <h4>Mangkok Sri Baduga</h4>

              <p>Rp200.000</p>

              <div class="quantity">
                <button>-</button>

                <input type="number" value="1" min="1" />

                <button>+</button>
              </div>
            </div>
          </div>
        </article>

        <article class="cart-card">
          <div class="store-header">
            <h3>Keramik Mulya Plered</h3>

            <span>Dikirim dalam 3 hari</span>
          </div>

          <div class="cart-content">
            <span class="check-icon">☑</span>

            <img src="gambar/aca74648293e2d81636180a760c38c08.jpg" />

            <div class="product-info">
              <h4>Mangkok Sri Baduga</h4>

              <p>Rp200.000</p>

              <div class="quantity">
                <button>-</button>

                <input type="number" value="1" min="1" />

                <button>+</button>
              </div>
            </div>
          </div>
        </article>
      </section>

      <section class="checkout-box">
        <p>
          Total (1 item):
          <strong>Rp200.000</strong>
        </p>

        <button onclick="window.location.href='checkout.html'">Check Out</button>
      </section>
    </main>
  </body>
</html>
