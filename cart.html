<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart - Sentra Keramik Purwakarta</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="cart.css" />
    <link rel="stylesheet" href="darkmode.css">
  </head>
  <body>
    <header class="detail-header">
      <nav class="detail-nav">
        <div class="logo">
          <img src="gambar/images-removebg-preview.png" alt="Logo" />
          <h2>Sentra Keramik Purwakarta</h2>
          <h2>|</h2>
          <h3>Cart</h3>
        </div>
        <ul>
          <li><a href="cart.html">🛒</a></li>
          <li><a>👤</a></li>
          <li>
            <button id="darkModeToggle" class="dark-toggle-btn" aria-label="Toggle Dark Mode">
              🌙
            </button>
          </li>
        </ul>
      </nav>
    </header>

    <main class="cart-page">
      <section class="delivery-option">
        <button class="delivery-btn">Delivery</button>
        <button class="pickup-btn active">Pick Up</button>
      </section>

      <section class="address-box">
        <div>
          <h4>Alamat Pengiriman</h4>
          <div id="addressDisplay" style="margin-top: 10px; color: #555;">
            <!-- Akan diisi oleh JavaScript -->
            <p style="color: #999;">Belum ada alamat. Klik "Tambah" untuk menambahkan.</p>
          </div>
        </div>
        <button onclick="window.location.href='address.html'">Tambah</button>
      </section>

      <!-- ganti "all-product" jadi "select-all" sesuai CSS -->
      <p class="select-all">☑ Semua</p>

      <!-- Container item cart, diisi oleh JavaScript -->
      <section class="cart-list" id="cartContainer">
    <!-- Dinamis -->
      </section>

      <!-- Floating Checkout Box -->
      <div class="checkout-wrapper">
          <section class="checkout-box">
              <p>
                  Total (<span id="checkedCount">0</span> item):
                  <strong id="totalHargaCart">Rp0</strong>
              </p>
              <button id="checkoutBtn">🛒 Check Out</button>
          </section>
      </div>
    </main>

    <script src="Java Script/cart.js"></script>
    <script src="Java Script/darkmode.js"></script>
  </body>
</html>
