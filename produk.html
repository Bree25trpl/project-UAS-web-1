<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <main class="detail-page">
    <section class="product-detail">
      <figure class="product-image">
        <img
          src="gambar/7eb68d7aa9cc5bf129b096b294d853ad.jpg"
          alt="Mangkok Sri Baduga"
        />
      </figure>

      <article class="product-info">
        <header>
          <h1>Mangkok Sri Baduga</h1>

          <div class="rating">
            ★★★★★
            <span>4.9 (128 Ulasan)</span>
          </div>

          <p class="price">Rp200.000</p>
        </header>

        <section class="purchase-box">
          <h2>Jumlah</h2>

          <div class="quantity">
            <button>-</button>
            <span>1</span>
            <button>+</button>
          </div>

          <p>Total <strong>Rp200.000</strong></p>

          <div class="button-group">
            <button>Add To Cart</button>
            <button>Purchase</button>
          </div>
        </section>
      </article>
    </section>

    <section class="product-specification">
      <header>
        <h2>Detail Produk</h2>
      </header>

      <table>
        <tr>
          <th>Nama Produk</th>
          <td>Mangkok Sri Baduga</td>
        </tr>
        <tr>
          <th>Kategori</th>
          <td>Mangkok</td>
        </tr>
        <tr>
          <th>Material</th>
          <td>Keramik</td>
        </tr>
        <tr>
          <th>Warna</th>
          <td>Coklat</td>
        </tr>
        <tr>
          <th>Diameter</th>
          <td>18 cm</td>
        </tr>
        <tr>
          <th>Berat</th>
          <td>700 gram</td>
        </tr>
      </table>
    </section>
  </main>
</html>
