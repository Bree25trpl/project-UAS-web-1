<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produk</title>
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="produk.css" />
  </head>

  <body>
    <header class="detail-header">
      <nav class="detail-nav">
        <div class="logo">
          <img src="gambar/images-removebg-preview.png" alt="Logo" />
          <h2>Sentra Keramik Purwakarta</h2>
          <h2>|</h2>
          <h3>Mulya Keramik Plered</h3>
        </div>

        <ul>
          <li><a>🛒</a></li>
          <li><a>👤</a></li>
        </ul>
      </nav>
    </header>

    <main class="detail-page">
      <section class="product-detail">
        <figure class="product-image">
          <img
            src="gambar/7eb68d7aa9cc5bf129b096b294d853ad.jpg"
            alt="Mangkok Sri Baduga"
          />
        </figure>

        <article class="product-info">
          <section>
            <h1>Mangkok Sri Baduga</h1>

            <div class="rating">
              ★★★★★
              <span>4.9 (128 Ulasan)</span>
            </div>

            <p class="price">Rp200.000</p>
          </section>

          <section class="purchase-box">
            <h2>Jumlah</h2>

            <div class="quantity">
              <button>-</button>
              <span>1</span>
              <button>+</button>
            </div>

            <p>Total <strong>Rp200.000</strong></p>

            <div class="button-group">
              <button>Add To Cart</button>
              <button>Purchase</button>
            </div>
          </section>
        </article>
      </section>
    </main>
  </body>
</html>
